<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Spacecraft Health Assessment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>🚀 Spacecraft Telemetry Health Assessment</h1>

<form action="/analyze" method="POST" enctype="multipart/form-data">

    <h3>Upload Telemetry CSV</h3>

    <input type="file" name="telemetry" accept=".csv" required>

    <br><br>

    <h3>Operator Note</h3>

    <textarea
        name="note"
        rows="6"
        cols="60"
        placeholder="Enter operator observations..."
        required></textarea>

    <br><br>

    <button type="submit">Analyze Spacecraft</button>

</form>

</div>

</body>
</html>
